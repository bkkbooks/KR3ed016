body:
  text: 卷第五婦人小兒烏金散一治婦人產後百病饒州彭氏傳有歌答十八篇文多不載表格燒時切忌婦人雞犬見如見服之無效切須忌之用一塹依此寫訖定四面各立坯子作一圈子其頭髮鯉魚皮各用一藏瓶去底入藥盛訖卻用瓦子蓋用好紙筋鹽泥固濟乘濕放在土字上用木炭火五斤燒通赤取藏瓶放冷打開出藥血餘半兩依前法燒之鯉魚皮一兩依前法燒之沒藥半兩紅花一分生用伏龍肝一分灶下取燒赤者土是凌霄花半兩色鮮者焙使好香墨半兩生用干柏木一分細研入香好者可使當歸半兩去梢土微炒令香用之上件九味並細為末產後母子熱疾後胎死在腹難產生衣不下血暈起坐不得如見異花口乾心悶乍寒乍熱四肢浮腫言語顛狂見神見鬼不語瀉痢腰膝疼痛小腸尿血澀痛崩中嘔逆不安咳嗽涕唾喉中如貓作聲面色遍身黑赤點子生眼澀腰腫身發筋急應是一切產後諸疾皆治以酒一盞煎取八分調藥兩錢空心頻服之用無灰酒大妙催生如聖散黃蜀葵花上一味焙乾為細末每服二錢熟湯放溫調下神妙或有漏血胎臟乾澀難產痛劇者並進三服良久腹中氣寬胎滑即時產下如無花只用黃蜀葵子爛研小半合以酒調濾去滓溫飲尤佳予家常合以濟人甚驗萬靈丸治婦人月水湛濁不通久無嗣息血癖氣痛四肢浮腫嘔逆心疼虛煩勞悶面色痿黃崩漏帶下寒熱蒸勞頭疼齒痛血下無度淋瀝諸疾產前安胎臨產催生產後胎結痛傷寒煩渴瀉痢血勞血運筋攣痰盛頭疼敗血上衝血刺泄瀉咳嗽喘急嗽血血塊起伏氣痞氣膈血作腰痛小便不禁子死腹中失蓋汗不出血風腳手痹頑凡產後諸疾皆治牡丹皮洗川藁本洗川當歸切開裹面赤黑色者佳洗白茯苓去皮赤石脂別研香白芷官桂去皮不見火白薇洗京芎洗玄胡索去皮白芍藥白朮米泔浸一宿以上各一兩甘草炙沉香不見火沒藥別研以上各半兩上件藥材皆用溫水洗淨杵羅為末煉蜜丸彈子大每服一粒或半粒空心溫酒化下凡妊娠臨月服此五六粒產時無痛如久無子服二十粒當月有子並治積年血風半身不遂種種血疾不問年深皆可療神效不可具述烏金散二治血崩漏下最治產後血崩並小產血崩漏下棕櫚皮烏梅乾薑燒灰存性三味各等分上研細每服二大錢煎烏梅湯調溫服不以時救生散治急喉閉產前產後有此疾皆可服之白殭蠶半兩去絲銼略炒甘草生一錢重上二味各取末秤和勻每服一錢匕以生薑汁調藥令稠灌下便急以溫茶清衝下治妊娠忽然下血腰痛不可忍鹿角一兩銼當歸一兩銼上二味作一服以水二盞煎至一盞去滓溫服食前治婦人產後因驚或怒傷肝或憂氣逆中脘或坐草風入子臟遂成顛狂或成中風不語角弓反張狂走歌唱不常荊芥穗瓦上焙乾上為細末每服二大錢熱米飲調下酒亦得用之如神催生藥香白芷百草霜上等分為末用童子小便卻入酒醋少許沸湯調下甚有神驗滑胎易產神效八味散一名如意散以下四方太平州郭師顯駐泊傳甘草二兩炙黃芩大豆黃卷乾薑吳茱萸麻子仁大麥糵炒以上各四兩桂心三分上為末酒服方寸匕湯飲亦得空心食前須入月方得服過三十日動作宜謹勿上廁恐不覺墮地如此之易也治產後虛眩不能支持兩脅當臍急痛氣上衝前後相引痛治之如神羊肉湯精羊肉切四兩當歸切半兩川芎銼半兩生薑切一兩上以水十盞煎至三盞掠上沫去滓分四服空心熱服一日服盡來日再合兩日滓並一日煎之當一劑服產後防暈方舊漆器上不以多少烈火燒煙燻鼻中即醒治產後大便不通緣亡血過多腸間乾燥甚至旬日以上腹脹急痛悶冒氣喘神昏力弱欲攻之則必致危殆不攻則無緣得利郭醫云嘗用古方蜜導法即時得下且無所損真活人之法其方雖見仲景傷寒論而產家不載最為緊要順經散治小兒十餘歲因驚之後心氣不行小腑淋瀝日及三十餘次漸覺黃瘦宜服此劑主之高逢辰制干傳韭子湯浸退取白仁干秤一兩益智子取仁鹽炒過半兩琥珀半兩令研石葦去毛土一錢白茯苓三分狗脊爁去毛淨半兩石燕子火煅醋炒出火毒令研極細半兩上七味為末和勻每服一錢用韭菜白煎湯調下空心食前各一服日午一服尤妙予表侄十餘歲時嘗遊慧山歸已昏暮遇一巨人醉臥寺門驚悸得疾自是之後一日便溺五六十度醫治數月不能效遂以病證扣高逢辰即援筆授此方服藥未幾日減一日初則三二十度最後十數度凡服兩料而愈九寶飲治小兒因傷寒邪不曾解利致成遠年嗽兼治上喘氣嗽不得睡常州頓助教傳紫蘇葉一兩薄荷葉一兩麻黃一兩去節大腹皮一兩肉桂半兩甘草半兩炙杏仁半兩麩炒桑白皮半兩陳橘皮半兩去穰者上件為粗末令將杏仁研極細將諸藥同和勻每服半錢水半盞烏梅半枚生薑一片同煎三分半食後去滓溫服臨睡亦得忌酒腥之物治小兒泄瀉金液丹青州白丸子上以二藥等分細研用麵糊丸如黍米大每服五十丸米飲下臨安節推章謐靜之云渠有小兒自五月患臟腑至七月不止遂作慢驚候以此藥投一服徐用少粥壓之即愈再服六七服遂無事錢氏小兒方亦載此肥兒丸外舅朱臨江傳川黃連蕪荑仁神麯炒大麥糵炒上四味等分為細末用獖豬膽為丸如小綠豆大每服三十丸加至五十丸食後熟水吞下此方乃李文定丞相家方海鹽祝宰為常寧時女子失奶極黃瘦丞相孫維翰來訪為傳此方自云其家得此藥小方脈未嘗登門女子自服此藥十日間取下疳蟲僅萬餘自此日益頑壯須小兒可服藥即與之孟正云秦相家盡服此藥但加蘿蔔子一味神麯豆蔻丸治小兒疳氣羸弱臟腑虛怯及滑泄不止飲食減少腹脹寒熱面黃肌瘦引飲無度神麯半兩炒肉豆蔻三枚麵裹煨麥糵半兩炒宣連半兩去須使君子十四枚去殼蕪荑仁一分蘆薈一分合研上為細末用豬膽汁浸面作糊為丸如黍米大每服二十丸飯飲吞下空心服木香分氣丸治小兒脾胃虛弱飲食過傷積滯內停或多吐逆胸膈不快面黃腹急下利無度香附子水浸一宿搗去黑皮令淨飯上蒸過一次焙乾秤二兩南木香一錢麵裹煨縮砂一分去殼甘草半兩炙京三稜半兩濕紙裹煨乘熟切焙薑黃半兩米泔水浸一宿切焙上為末用白麵糊為丸如黍米大每服二十丸飯飲吞下溫熟水亦得食後服助胃膏助小兒胃氣思食止渴常服甚妙饒州張採助教傳人參白朮甘草茴香各半兩乾山藥一兩檀香一錢烏梅肉半兩白豆蔻仁半兩縮砂仁半兩乾木瓜一兩上為細末煉蜜為膏空心如皂子大每服一丸嚼服或溫水吞下治小兒麻豆瘡子已出太盛發潰膿水黏衣著席不能轉動疼痛濕爛敷之便乾更不成瘢痕方上用牛糞不以多少曬乾火煅成灰取心中白者研令極細如用蛤粉相似用綿撲撲有瘡處不以時候一方用烏牛糞一方用黃牛糞出幼幼新書一名白龍散此方用之有驗辰砂安驚丸理風熱涎盛身體拘急睡中不穩鎮心以下三方張採助教傳天麻一分川芎二錢防風半兩洗去蘆頭甘草一兩炙白附子一分人參半兩洗茯神半兩硃砂二錢一半入藥一半為衣上細末煉蜜為丸如雞頭大每一丸至兩丸用薄荷荊芥煎湯化下羌活膏散風熱化痰安驚羌活半兩荊芥穗半兩白朮二錢甘草半兩白附子二錢桔梗去蘆頭洗半兩白茯苓二錢川芎二錢防風二錢去蘆頭硃砂二錢一半入藥一半為衣上細末煉蜜為丸如皂皂子大每服一丸至兩丸用薄荷湯化下如痰盛加臘茶湯下大天南星丸治小兒急慢驚風涎潮發搐目睛上視口眼相引牙關緊急背脊強直精神昏塞連日不省滴乳香研龍腦研牛黃研各半錢硃砂研三錢麝香研一錢半天麻人參防風各一分去蘆頭天南星黃牛膽汁制半兩乾蠍十四個湯浸軟去腹內土微炒上細末煉蜜為丸如大雞頭大每服一丸荊芥薄荷湯下治褓中小兒臍風撮口法上視小兒上下齦齦當口中心處若有白色如紅豆大此病發之候也急以指爪正當中掐之自外達內掐令匝微血出亦不妨又於白處兩盡頭亦依此掐令內外斷只掐令氣脈斷不必破肉指爪勿令大銛恐傷兒甚沈存中雲為河北察訪使日到趙郡有老人來獻此法云篤老惜此法將不傳願以濟人詢之趙人云此翁生平手救千餘兒矣環數邑之人皆就此翁治兒應手而愈沒石子丸治小兒吐瀉臟腑不禁上官醫傳黃連鷹爪者炒訶子炮去核肉豆蔻麵裹炮木香炮沒石子炮上各秤一錢為細末粟米飯為丸如綠豆大米飲三十丸誤吞珠銅鐵而哽者方燒弩銅牙令赤內酒中飲之立愈誤吞錢方搗火炭末服方寸匕則出誤吞釘及箭金針鐵等物方多食肥羊肉脂及諸肥肉自裹出封囟天南星一個極大者上以慢火炮裂去皮臍入華陰細辛三錢同杵為末入麝香少許用米醋調塗緋帛貼在囟上以干為度治小兒吐宗人子與寺丞傳赤曲半兩藿香葉半兩丁香一分不見火如熱吐即減丁香之半肉豆蔻一個麵裹炮上為細末每服一錢大段小者半錢煎香楠木湯調下楠木定驚止吐神妙不可言治小兒誤食谷芒鵝唌上將鵝倒瀝唌盛半蛤蜊令小兒飲之谷芒即下消風散治小兒一切口瘡並重舌鵝口以下五方信州蔡敏修助教傳硼砂一錢硃砂一字雄黃一錢甘草末一字腦子一字上研細和勻少許敷之吞嚥不妨屢用如方雄朱散治小兒腮頷裡外腫核石膏二錢雄黃二錢牙硝一錢天竺黃二錢甘草末一錢腦子半字上研細和勻敷之里核吃不妨外核用薄荷汁調塗繳口新水調亦得金華散治小兒一切瘡瘍黃皮去粗皮半兩炙焦黃連半兩海螵蛸三錢五倍子三錢輕粉一分研入上為細末和勻瘡乾用油調敷濕時干敷如聖散治小兒一切頭瘡松脂半兩研細輕粉半兩上件和勻油調敷之急風散治小兒喉閉咽痛青膽礬成片好者每用少許研細新水調少許咽之吐痰為妙大人亦治墜涎丸治咳嗽化痰以下二方張採助教傳皆有神驗天南星去皮臍生用半兩白附子洗去皮半兩川烏尖去皮臍生用一分白殭蠶洗淨直者一分白礬枯一分半夏洗淨生用一兩上為細末用薑汁糊為丸如小綠豆大每服二十丸用生薑薄荷泡湯吞下辰砂丸治咳嗽安驚化痰辰砂半兩研一半為衣一半入藥白礬枯半兩天南星去皮臍切作片子再用雪水煮焙乾一兩大半夏湯浸七次用生薑自然汁作餅子炙一兩半白附子去皮炮半兩上為細末用糯米粉煮糊為丸如小綠豆大每服二十丸用臘茶薄荷湯吞下四君子丸治脾虛受食不克化停積中脘吐逆噁心臟腑泄瀉常服消化食滯進美飲食厚腸胃充肌體悅顏色退黃婺州蔣助教傳以下三方予家常合甚效縮砂仁烏梅肉焙乾秤陳橘皮去穰取仁訶子紙裹煨去核取皮用上各一兩為末煮好大棗取肉為丸如麻子大每服三十丸至五十丸棗湯熟水任下無時肥兒丸以下二方張採助教傳黃連炒蕪荑仁炒神麯炒麥糵炒蘆薈細研以上各等分上為細末獖豬膽汁調麵糊為丸小綠豆大每服十五丸至二十丸飰飲吞下觀音散理脾胃不和氣弱昏倦多困不思食白朮一分人參一分甘草一分炙乾葛出粉一分藿香葉一分白扁豆三錢炒茯苓三錢櫻粟子三錢炒綿黃耆一分炙木香一分上為細末每服二錢用生薑棗子紫蘇煎湯調下不計時日進三服
