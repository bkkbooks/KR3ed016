body:
  text: 後記上集驗方五卷皆豫平生用之有著驗或雖未及用而傳聞之審者刻之姑孰與衆共之乾道庚寅十二月十日番陽洪遵書賢人留意濟斯民學仕之餘未舍勤猶訪醫方治疾病豈因富貴墮心身乃知後世家風遠想見當年德業新愧我長貧仍懶墮不能望見屬車塵洪公當宋盛時為侍從官兄為宰相其富貴為何如也而懇懇不忘救民之事著成方書百世行之余素不諳醫而喜蓄醫書非真好醫書也好醫書之為宋元舊刻者今茲六月中有揚州書友來告余云有宋版太醫集業四冊欲售余屬其攜來久而未至聞已售於他姓亦不甚惜之因向來各家書目未載即舊藏書家亦俱不知或是書未必真宋版後閲陸其清佳趣堂書目載是書云文淵閣藏本有楊南峰鄒臣虎二跋方悔前此不之買而已弗可追矣適余友陶琅軒從都中寄此宋版洪氏集驗方二本至乃欣然以為聊饜我欲蓋此宋版醫書亦所罕有見有季氏圖書隨檢延令宋版書目知即系是書卷後八行墨跡季氏云鮮于樞詩跋諒必有本而云然百世行之以下定有脫文想滄葦收藏時必未遺失故知之詳也至於板刻年月載之甚詳宋刻固無疑義而余舊藏傷寒要旨與此同出一手黃憲毛用刻工姓名可考而證刊刻之地同是姑孰刊刻之時同是乾道唯辛卯差後庚寅一年爾二書之分不知幾時二書之合又在一地豈非奇之又奇耶余言詳彼書跋語中茲特志得書之由並志余所以考證是書者如此甲子十一月蕘翁黃丕烈識頃在楊州郡齊借到太醫集業尋覽之餘見板口有三因字遂取三因極一病證方論互勘知即割裂其殘本為之耳太醫集業者第二卷之一條並非別有此書也佳趣堂書目所云誤歸晤蕘翁出示是跋舉以語之囑記於後他年倘仍收得必拊掌一笑嘉慶乙丑八月澗薲顧廣圻書
