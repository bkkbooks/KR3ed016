body:
  text: 卷第四治舌衄二方出方氏泊宅編槐花上炒為末摻之昔有士人無故出血仍有小穴醫者不曉何疾偶曰此名舌衄用此而愈治舌腫蒲黃上為末摻之須真者佳一士人沿汴東歸夜泊村步其妻熟寐撼之問何事不答又撼之妻驚起視之舌腫滿口不能出聲急訪醫得一叟負囊而至用藥摻比曉復舊問之乃蒲黃也治湯火傷大黃上搗碎調以美醋敷瘡上夷堅志云金山修供神怒庖人不謹漬其手鑊中痛楚徹骨號呼欲死神授此方遂愈蓯蓉丸暖水藏明目京師老李畫傳尋常眼藥多涼非水藏之便蓯蓉二兩酒浸一宿焙乾巴戟枸杞子菊花川楝子各一兩上為末煉蜜為丸如桐子大每服三十粒溫酒或鹽湯下空心食前臨臥治乾癬以下八方景盧傳樟腦一錢白礬半錢生用雄黃半錢並細研以生薑自然汁釅醋各少許磨羊蹄菜根如手指大二寸許調藥擦敷止有食頃痛極不過三次見效治淋皂角刺燒存性破故紙等分為細末紅酒或無灰酒調下治沙石淋定磁末羅細以生地黃槌碎同煎如熟水時時飲之治毒蛇傷屢試如方香白芷為末麥門冬水調飲倉卒時新汲水亦可治冷積降氣寬膈逐痰橘皮去穰取紅一斤甘草鹽各四兩水五碗慢火煮乾焙搗為末點服補益治漏祕精丸大附子炮裂去皮臍龍骨煅通赤牛膝酒浸一宿焙肉蓯蓉酒浸一宿焙巴戟去心菟絲子酒浸三宿上等分為末煉蜜丸梧桐子大空心溫酒或鹽湯下三五十粒甚者日午再服小便如米泔者不過十服治傷折骨碎此方用之甚驗大鰾膠一味碎銼用無灰酒煮爛如粥逐旋抄吃極苦硬須強進之以多為度每二兩或四兩為一服傷甚者不過半斤治疝氣偏墜牡蠣火煅良薑上二味為末用津唾調塗之立消烏金散專治痔疾神驗以下五方饒州王康孺翰林傳黃牛角腮烏金子五倍子紫河車威靈仙枳殼上等分入瓷瓶內用白雄雞糞和黃泥固濟上留一竅子炭火煅煙盡為度取出地上出火氣為細末每服三錢空心酒調下倍苓丸治腸風下血槐花六兩五倍子三兩五靈脂三兩上件為細末麵糊為丸如梧桐子大每服三十丸米飲下治風毒氣眼連眶赤爛洗眼神妙白沙蜜二兩乳香通明者一皂子大溫水浴過好黃丹抄半錢上一處於砂石器內或銀器內用慢火熬令焦黑色滴在水中不化為度每用兩黑豆大沸湯浸洗眼藥成露一宿方好治腰痛五加皮上不拘多少為細末如梧桐子大酒煮麵糊為丸每服三十丸空心溫酒下秋石丹治男子婦人虛勞瘦秋石一兩乾山藥一兩上為末別以酒調山藥為糊如梧桐子大又以乾山藥為衣每服二十丸溫酒米飲任下治諸癇道人黃大成傳屢用之如方鴨舌膽礬煅存性上為細末每發時用一字以筆管吹入鼻內涎出即愈治豆瘡倒擪入肉景盧傳人齒一個不以久近燒成灰用獖豬尾血調和了入酒小盞同服之竇永仲教授年六歲時生瘡為鄰近焚花所觸盡擪入肉諸醫束手母已發聲哭親戚劉知縣説此方才飲酒了元瘡隨手如故豫見沈存中良方亦載此用人齒三五枚炙黃為末乳香湯調下溫酒亦得治喉閉陳子範教授傳皂角半錐上撾為末用醋一碗就鍋內煎數沸以帛濾滓令病人服之又方高逢辰制干傳麻油少許生油上以箸絞油生沫即以油沫飲之治腰痛以下二方孫仲益尚書傳蕓薹子上用米醋研調敷疼處治腸風橡斗子上以干大棗置橡斗子中以麵裹火炮碎為末用陳米飲作一服瘡藥方饒州十七里李家傳甚妙叢竹殼野油麻葉陳屋茅百合花乾者貓兒骨以上燒灰入輕粉和麻油調塗治癬羊蹄根切作片上至五更初先以布揩癬上即取羊蹄根爛嚼止用汁塗後以其片揩之將冷水嗽口及洗手初用藥時忌不得語欲氣勿泄也接骨方牡蠣少許上為末用糯米粥調之塗其上欲以沙木板夾之即愈治漏瘡高逢辰制干傳麝香臘茶上等分為末干敷治外風入瘡口腫毒方全蠍一個白殭蠶三個去絲蟬蛻三個上為細末裂蔥汁調塗即愈癬藥白礬飛過一兩黃丹半錢白藥子半兩上為細末旋掘羊蹄根獨腳者一根者是取自然汁調藥先用布擦癬微破用藥敷之治喉閉郭廷圭知縣傳白礬一斤好者好酒一斤無灰上同熬以酒盡為度入合子臨時用之治盜汗防風細切上為細末浮麥煎湯服之婺州汪伯敏將仕云嘗見周仲恭尚書言舊有盜汗之疾每至大屋則肢體凜然須以幃幕遮護後得此方遂愈治傷風五積散敗毒散上以二藥合煎服之蓋五積性溫敗毒稍涼服之無不效者治腳腫四物湯小續命湯上以二藥同煎章謐靜之節推云嘗有人猝患腳腫服此遂愈甘豆湯治腳腫黑豆上同煎湯服之郭鎮廷圭知縣云昔年太學士人圍閉中多患腳腫至腹則死前後如此者非一人後有施此方服之皆愈蓋神方也灸勞法以肚臍相對取背脊骨灸之甚妙治頭風頭痛人中白焰硝各一兩上用水一碗無灰皮紙濾下研細重湯煮過再研入少腦子每用少許以斡耳子搐入鼻中即愈襄陽府胡急腳專貨此藥積錢至數萬緡祕惜不傳上官醫以計得之茶牙湯治偏正頭疼噁心嘔吐不止者細茶牙一兩生草烏半兩去皮尖細辛半兩上為粗末每五錢水二盞慢火煎至六分去滓溫服一服取效附牛丸治丈夫婦人腰痛重膇步武艱辛痛不可忍附牛丸上官駐泊傳附子半兩炮去皮臍黑牽牛瓦上炒令乾上為細末酒煮麵為丸如梧桐子大每三十丸空心溫酒下如半邊腰疼只用黑牽牛瓦上焙乾一邊附子炮一邊餘一邊生用不去皮搗羅為末如前法服治爛緣風眼覆盆子上取葉挼碎以汁滴眼中即有蟲出上官醫云頃歲寓居潭州瀏陽縣石霜寺有皇叔太尉者乳媼患爛緣風眼近二十年一日有藥嫗過之曰老婆能治此眼眼中有蟲赤而長其細如絲遂入山取藥其家遣人尾其後但見沿山路採取樹葉以手挼碎入口咀嚼留其汁以皂紗蒙患人眼握筆畫雙眼於紗上然後用藥汁滴於眼之下緣須臾蟲自紗中出其數十七其家甚喜嫗去數日復至則眼下緣肉乾如常人再用前法治眼上緣得蟲又以十數嫗謂上官曰公為醫官不可不傳此方須以錢二萬償我上官諾之遍召傍近村婦患此眼者治之無不瘥嫗又曰是方出本草果部中覆盆子注云葉挼絞取汁滴目中去膚赤有蟲出如絲線上官屢用之皆效治䯡瘡上官醫傳鱔魚上以鱔魚數條打死先用油塗其腹置患人腿上盤令周遍以帕子系定食頃患人覺痛不可忍然後取鱔鱔腹上有針眼大竅子皆蟲也蟲既去盡卻用死人脛骨燒灰塗瘡口即愈沈存中良方亦載活鱔治漏瘡治癬疥宣連去須酒浸一宿上焙乾為末蜜丸如梧桐子大空心日午臨臥酒吞二十粒東坡云惠州軍校姚歡年八十餘鬚髮不白自言年六十歲患癬疥周匝頂踵或教服黃連遂愈久服故發不白治腳氣灸法上灸風市兩穴以多為貴蔡元長為開封少尹一日據案忽覺蟲自足心行至腰間落筆暈倒久之方蘇椽曹曰此疾非俞山人不可療使呼之俞曰真腳氣也灸風市一艾而去明日又覺蟲自足至風市便止又明日疾如初召俞俞曰是疾非千艾不可一艾力盡故疾復作蔡如其言灸數百自此遂愈沈公雅檢正説豫紹興辛巳歲在吳門虛郡宅以備巡幸徒治吳縣縣卑濕始得足痹之疾以風市為主兼肩隅曲池三里灸之即愈治毒蛇咬毒氣已入腹青黯腫脹痛不能忍太平州湯三益翰林傳生白礬末須看所咬瘡口大小然後抄礬末於刀頭上熔令沸乘沸滴在瘡口上隨手痛止若腹中毒氣未退依前黯腫即取草決明葉兩握研取自然汁以熱酒侵下卻將滓貼瘡口上軟帛輕手系之治鼻衄不可止欲絶者上茅花無即以根代每服一大把銼水兩碗煎濃汁一碗分二服沈存中雲林次中御史在楚州嘗訪一故人久之不出或問之云子婦衄血垂盡方救視未及延客坐中一客云適有藥急令掇茅花一大把煎濃汁一碗帶囊中取小紅丸二粒令茅花湯吞下一服即瘥而不言其方後有人聞之曰此只是茅花之功耳試復問之其人大笑曰誠如此紅丸乃含香硃砂丸恐不信茅花之功以此為記耳存中在鄜延時一將官卒病衄甚困以此療之即瘥又徐德占教衄者急灸項後髮際兩筋間宛宛中三壯立定蓋血自此入腦注鼻中常人以線勒頸後尚可止衄此灸決效無疑治諸鯁以木炭皮為細末研令極細如無炭皮堅炭亦可粥飲調下二錢日四五服以鯁下為度此法人家皆有沈存中雲在漢東乃目睹其神有劉晦士人鄰家一兒誤吞一錢以此飲之下一物如大烏梅剖之乃炭裹一錢也池州徐使君極寶此方數數用之未有不效者近歲纍有人言得此方之效不復悉載治盜汗當歸半兩去蘆細切人參半兩豬心一個雄者細切上以豬心分四片用一片水三盞煎一盞半作二服一方當歸人參各一兩雄豬心半個細切五盞水煎三盞去滓兩服龍鬚散治中暑迷悶不省人事暑月代一切暑藥豫暑月常合此藥以飲從者甘草一兩炙烏梅一兩去仁瓦上焙乾白礬半兩生研五倍子一兩揀上為細末入白麵四兩同和勻每服一大錢新水調下如泄瀉霍亂作渴一服即愈雖平日不敢飲冷者以冷水服藥不妨世傳仁廟所賜近臣方治風牙疼華陰細辛多年石灰上二味等分為末每用少許揩牙瀝去涎溫水灌漱立止治蛀牙疼巴豆不以多少去殼麵裹煨熟去面粟米飰同巴豆研為丸如蘿蔔子大每用一二粒綿裹安於蛀孔內仍睡少時覺不疼去之治風牙蛀牙一切疼痛每用藥止用一米大仍以連紙貼之巴豆一大個去大皮豆豉七個大蒜頭一個去須並去薄皮上作一處研極爛丸作一團用油紙裹每遇牙疼至臥時先以溫水漱口次以針微剔所痛之處以藥實之明日復以水漱灌即愈治五種牙疼不蛀破處者細辛乾薑川烏草烏蓽茇吳茱萸各半兩𦬣草一兩木律一分上為細末先用鹽湯蘸濕手點藥揩牙候良久藥力敗用溫水灌漱齒痛即止治風蛀牙如蟲蛀破者乳香一錢巴豆三粒紙裹壓去油上火上熔乳香成汁用巴豆不住攪和候冷取出圓成膏子酌量牙齒竅穴大小將燈上炙旋圓納於穴中痛即止治牙搖牙宣湯致遠知院傳蘘草根一名香附草上去皮細切用生薑汁浸一夕次日曝乾曬為末用之治暴嗽不止或失聲者饒州上官醫傳款冬花去枝杖細銼焙乾為細末上用生蜜搜和作餅子貯火香爐中如裝香然安藥在火上令病人開口吸煙米飲吞下臨臥時豫頃年見紹興趙判宗云先以款冬花在香爐中燒煙卻用小竹罩罩之止露一竅承之以口凡三兩次嗽即止治惡瘡久不較諸藥無效白鱔魚頭乾者上燒為細末用輕粉調塗治冷漏行在鄒春大夫傳蜣螂蟲化蟬者上用三兩枚於瓦上炒成灰乾摻瘡口治喉閉南硼砂一錢青黛一錢甘草半錢白殭蠶二錢上為細末用腦子少許研和乾摻喉間即愈治咽喉腫痛白礬飛過甘草炙各半兩上為細末乾摻喉中徐徐吞下治凍死舊薦上用薦束凍死者其中袞轉不絶手自然和氣相續即愈治暍死泥漿上於行路中旋以刀器掘開一穴入水其中搗之卻取爛漿以飲死者即愈治溺死豫在鄱陽嘗有溺水者身僵氣絶用此法治之即蘇干壁泥上先打壁泥一堵置之地上卻以死者仰臥其上更以壁土覆之止露口眼自然水氣翕入泥中其人遂蘇治火燒湯潑醋上以酸者用手擦地上泥塗之治湯火瘡釜鑊下黑塵上以水爛研入蜜及油調敷立愈治嵌甲青蠅四十九枚麝香百文上取蠅折去兩翼不用以其餘曬乾入麝為末或急用則取蠅置懷中候乾摻之或瘡干即入油調敷又一方用蝸牛一枚橄欖核一枚燒存性同為細末入膩粉黃丹油調敷然不若此方為妙治小腸氣舶上茴香一斤上用生薑四兩研碎並滓汁拌和茴香過一宿曬焙乾為細末次用青鹽二兩別碾入藥酒糊為丸如梧桐子大每服三五十丸鹽湯或溫酒下空心食前郭廷圭知縣云舊苦此疾歲不下五七發服藥一料病根遂除今以十五六年不作
