body:
  text: 卷第三蓯蓉茸附丸平補真元益養脾腎固精壯氣暖胃思食督府王翰林方丞相兄舊苦腳氣自服此藥十餘年不作鹿茸一兩先用草燒去毛切作片子用酥炙令香熟為度蓯蓉四兩酒浸一宿切作片子焙乾菟絲子六兩酒浸兩宿炒令半乾搗作餅子焙牛膝二兩酒浸一宿切焙熟乾地黃二兩炒焙真烏藥一兩川五味子一兩附子一兩炮去皮臍白朮一兩天麻一兩補骨脂一兩炒葫蘆巴一兩炒茴香一兩炒干淡木瓜一兩沉香一分木香一錢麵煨丁香二錢不見火上件搗羅為細末酒糊為丸如梧桐子大每服三五十丸空心臨臥米飲溫酒鹽湯下鹿茸世寶丸諸虛不足心脾氣弱腹脅脹急腸鳴泄瀉腹疼手足厥逆頑痹中滿噁心頭疼怯寒肢體痠痛飲食少思氣短乏力驚悸自汗並能服之用藥如下督府王翰林方鹿茸酥塗炙附子炮去臍白朮炒陽起石燒赤椒紅炒出汗成煉鍾乳粉蓯蓉酒浸炙人參去蘆肉豆蔻麵裹煨川當歸炒牛膝去蘆酒浸一宿白茯苓沉香巴戟去心以上各一兩上件十三味依法修制併為細末次入鍾乳粉拌勻煉蜜為丸如梧桐子大每服四十粒鹽飯飲或鹽湯送下食前一日三服五解散治傷風感寒或內傷生冷頭目昏痛身體壯熱胸膈不快乾嘔噁心怯風怕寒體虛自汗藿香葉一兩去土人參一兩白朮一兩半夏一兩湯蕩洗七遍甘草一兩炒白茯苓一兩陳橘皮一兩湯蕩洗一次厚朴二兩去粗皮用生薑自然汁塗炙紫色為度上件同搗為粗末每服五大錢水一盞半生薑七片棗子二枚煎至七分去滓溫服不拘時候盲腸丸治遠近一切赤白痢實腸胃進飲食當歸一兩肉豆蔻仁半兩粟米炒以黃為度訶子皮炮半兩黃連去須一分烏梅肉一分櫻粟半兩炒黃黑色上為細末煉蜜熟丸大如緑豆許每服十五丸溫陳米飲食前平江辛太丞傳有加芎者尤妙硫附鹽礬丸治經年久病腸風下血不止虛弱之甚者一服見效以下二方上官彥成駐泊傳附子一兩炮去皮臍別杵為細末緑礬四兩用瓶子盛蓋之火煅食頃候冷取出入鹽一合硫黃一兩同礬研過依前入瓶子內燒如食頃候冷取出再研令勻為極細末上件二味藥末同合一處令勻以粟米粥為丸如桐子大每日空心用生地黃汁吞下溫酒米飲亦得每服三十丸治五種腸風下血上廁糞前有血名外痔糞後有血名內痔大腸不收名脫肛穀道四面有胬肉如奶名奶舉痔頭上有孔腸出名漏並皆治之黃牛角腮一枝捶碎蛇蛻皮一條白者豬牙皂角七莖穿山甲一處七十鱗刺蝟一兩銼上件五味入瓷瓶子內以黃泥封固候乾先以小火燒令煙出後用大火煅令通赤為度取出攤開候冷搗羅為細末患者先用胡桃一個分作四分一分臨臥時細研如糊溫酒下便睡先引出蟲至五更時以溫酒調下藥末三錢至辰時更進一服久年不過三服立效比金散治腸風下血方及治痔漏又名立效散饒州周道太丞傳蝟皮一個皂角刺二兩䐦藤子一個去穰銼碎別碾為末豬牙皂角一兩白礬半兩除䐦藤子外上四味入瓷瓶內鹽泥封固候乾先以小火燒令煙出方用大火煅令煙盡為度取出攤冷杵羅細末入䐦藤子末和勻每服一大錢溫酒調下空心食前服治五種腸風痔疾饒州王康孺翰林傳凡下血皆為腸風糞後有血名內痔糞前名外痔大腸頭出謂之脫肛穀道四邊有胬肉謂之鼠奶痔頭上出血謂之漏此方通治之黃牛角腮一個豬牙皂角二兩蛇皮一條穿山甲二兩大附子一個炮去皮臍當歸半兩炒蒻葉四兩麝香一錢蝟皮一個上件一處砂瓶內用炭火煅令通赤取出於地上用盆合定四畔用土覆之去火毒然後搗羅為細末患者先用胡桃肉半個研爛同酒半盞調藥末二錢服之便效阿魏良薑丸治三脘氣弱中焦積寒脾不磨飲食遲化吃物頻傷胸膈滿悶脅肋㽲刺嘔吐噦逆噫醋噁心腹脹腸鳴心腹疼痛噎塞膈氣翻胃吐食飲食減少悉能治之以下二方上官駐泊傳青皮三兩陳皮二兩良薑二兩紅豆二兩桂去粗皮一兩縮砂去皮二兩蓬朮炮二兩草果子去皮二兩乾薑炮二兩萊蔔子二兩炒木香二兩硇砂半錢阿魏一分並硇砂用醋化去砂石研上和麵煮糊為丸如緑豆大每服五十粒淡薑湯吞下不拘時候日進二服久服大補益脾胃空膈令人能食去寒濕強中溫暖如素來有沉寒積冷腹中時作疼痛宜服之或無此證去硇砂常服溫養中焦有益脾胃麋茸丸治婦人風虛勞冷一切諸疾或風寒邪氣留滯經絡氣血冷澀不能溫潤肌膚或風寒客於腹內則脾胃冷弱不能克消水穀或腸虛受冷大便時泄或子藏挾寒月水不調乍多乍少或月前或月後或淋瀝不斷或閉不通百節痠疼頭頂作痛相應臍腹腰腿痛痹不仁悉能主治大補益元藏絶忌羊肉解藥力麋茸火燒去毛薄切酥塗炙四兩當歸去蘆酒浸一宿焙乾二兩鹿茸火燒去毛薄切酥塗炙二兩鹿角膠麩炒二兩大黑附子炮去皮臍二兩沉香二兩不見火好者肉蓯蓉酒洗薄切焙乾三兩牛膝去蘆酒浸一宿焙乾二兩熟乾地黃酒洗焙乾稱三兩赤石脂一兩真者破故紙酒浸一宿炒二兩一方有麝香二兩陽起石一兩半夜間用瓷罐子盛以酒二升煮一宿水洗焙乾乳鉢研如粉上十二味同為細末用酒蜜各等分熬成稠膏子搜和成劑入木臼內杵三千餘杵丸如梧桐子大每服三十粒漸加四十粒至五十粒溫酒鹽湯吞下空心日午服之法酒二十兩蜜二十兩慢火同熬成膏子丸人參大溫中丸治三焦不順脾胃積冷心腹大痛嘔逆噁心兩脅刺痛胸膈滿悶腹脹腸鳴泄瀉頻並溫脾暖胃婺州李麾翰林傳人參去蘆頭一兩白朮一兩銼陳橘皮去白一兩紫蘇子揀淨一兩高良薑一兩銼官桂去粗皮一兩川乾薑五錢炮上件七味為細末煉蜜為丸每一兩作十丸每服一丸煎生薑湯嚼下不拘時水陸二仙丹取雞頭去外皮取實連殼雜搗令碎曬乾為末復取糖櫻子去外刺並其中子洗淨搗碎入甑中蒸令熟卻用所蒸湯淋三兩過取所淋糖櫻汁入銀銚慢火熬成稀膏用以和雞頭末丸如梧桐子大每服鹽湯下五十丸久服固真元悅澤顏色括蒼吳寅仲久服有奇功此藥稍閉當以車前子末解之神應乳香丸治諸般惡痢腹中攪刺日夕頻並危惡不瘥安息一分酒浸曬三日去滓研為膏訶子一錢乳香一分酒少許化開曬三日再用火焙熔令乾研為末沒藥一分研為末用安息香膏子和勻用生杏仁不以多少燒令煙出上焙膏子一日干為度上件四味研為細末滴水為丸如緑豆大每服五丸七丸乳香湯下空心食前日三服加至三五十丸不忌毒物其效如神神妙驅風散治風毒上攻眼目澀癢疼不可忍者或上下瞼眥赤爛浮翳瘀肉侵睛出王氏博濟方五倍子一兩槌破去塵土蔓荊子一兩半洗令淨上二味同杵為末每服二錢水二盞銅石器內煎及一盞澄滓熱淋洗留滓二服再依前法煎淋洗大能明目去澀癢虛風丸治大人小兒一切風虛昏眩神志不爽心氣不寧手足搐跳睡臥不穩麝一錢五靈脂為末銀器內炒煙盡為度稱一兩白附子真大者炮烈半兩天南星大者炮去皮臍一兩烏蛇只用項後肉去皮酒浸一宿干稱一兩蟾頭一個大者炭火燒煙將盡取出不令成灰赤腳蜈蚣三條全者酒浸一宿焙乾上除麝處同為細末絶細再入麝同研勻以醇酒作糊為丸桐子大每服一丸不拘時候或二丸以人參湯麝香湯嚼下或溫酒亦得治小兒慢驚極妙四斤丸壯筋骨治腳膝疼痛宣木瓜去穰切焙乾稱牛膝去蘆頭寸銼焙乾稱蓯蓉洗塊切焙乾稱天麻細銼以上各半斤上件用無灰酒五升浸春浸五日夏浸三日秋浸五日冬浸十日日足取藥焙乾加附子二兩虎骨一兩虎骨細鎊附子炮去皮尖同為細末用浸藥酒煮麵糊為丸如梧桐子大每服五十丸溫酒或鹽湯下空心食前服虎骨須用酥炙令蘇妙應丸治婦人血經不調月事湛濁加之驚憂遂發痎瘧後汗出過多損耗氣血常服滋暖子宮調血養氣池州徐學諭傳當歸去蘆頭二兩延胡索去土一兩澤蘭取葉一兩半白芍藥雪白者一兩肉桂去粗皮一兩不見火牡丹皮去骨一兩川芎一兩木香半兩不見火石斛去苗一兩川薑一兩炮熟乾地黃淨冼薄切焙乾稱二兩上件修制了焙乾搗羅為末醋煮麵糊和丸如梧桐子大每服二十粒用溫酒或米飲吞下空心及晚飢服之丁香草果散治大人小兒脾虛發熱及潮熱他藥不能治者服之如神余真州傳丁香一錢半揀辛辣者草果三個麵裹煨面烈為度麥門冬半兩去心湯洗人參二錢茯苓二錢半半夏二錢薑製甘草二錢炙淡竹葉數葉上為粗末分作六服用水一盞半姜三片棗一個煎七分去滓不拘時服小兒加陳皮二錢去穰神仙透空丸治男子婦人偏正頭痛噁心産後體虛傷風憎寒頭痛洗頭沐浴傷風壯熱頭痛痰厥頭痛腎厥頭痛虛眩項筋緊急應一切頭痛江州陳太丞傳天麻一兩洗香白芷一兩半夏一兩生用天南星一兩乾薑四錢用川芎二兩洗地龍半兩錘洗去土淨川烏一兩生用去皮尖草烏一兩生用去皮尖細辛半兩甘草二兩生用白附子半兩上為細末以藥末一兩入白麵一兩用新汲水搜和為丸每一兩分作十丸於新板上排定日內曬之如合須是伏中合沉香蓽澄茄湯治腰腿間寒濕作痛饒州雍醫傳沉香半兩南木香四錢丁香四錢檀香四錢蓽澄茄半兩片子白薑黃半兩陳橘紅三錢青皮去白三錢粉大甘草七錢藿香去淨土四錢白豆蔻仁半兩天台烏藥半兩人參半兩縮砂仁三錢上為細末每服一二錢入鹽點服神功散灸結胸傷寒不問陰陽二毒只微有氣者皆可灸下火立效黃連七寸為末巴豆七粒去皮新瓦上出油二味拌勻令患人仰面臥先用三斡耳和艾一炷如中指大更用三斡耳子先著在患人臍中後安艾炷其上只一炷覺臍腹間有聲即便汗出而愈治風烏荊丸川烏頭一兩炮去皮荊芥穗二兩上醋麵糊為丸如梧桐子大每服二十丸酒或熟水下有疾食空時日三四服無疾早晨一服少府郭監丞少病風搴搐頤頷寬嚲不收手承頷然後能食服此六七服即瘥遂長服之以五十餘年年七十餘強健鬚髮無白者此藥療腸風下血尤妙纍有人得效下血人服此而瘥者一歲之內數人烏金散治冒暑悶亂不省人事欲死及發燥引飲無度咽中痰涎不下不蛀皂角一斤刮去皮猛火炙令成麩炭仍須存性不可使成白灰也稱三兩甘草一兩炙上同為細末以新汲水或溫熟水調三大錢立瘥此藥神妙不可具述良薑湯治陰寒積冷心腹大痛嘔逆噁心手足厥冷心胸不快腰背疼痛婺州李麾翰林傳高良薑一兩銼碎炒官桂一兩去皮當歸去蘆頭用一兩銼炒乾薑一兩炮人參一兩去蘆頭吳茱萸七錢半炒白茯苓一兩附子半兩炮上為細末每服二大錢水一盞半入生薑五片煎至七分去滓膈空服治氣塊刺痛暮夜即作至不可忍多因氣中傷冷所致久而不治婦人尤宜服之以下二方信守孟郎中充傳鱉甲去裙並膜醋炙半兩當歸去尾一兩木香半兩青橘皮去白一分枳實半兩人參半兩京三稜半兩沒藥一分研血竭一分研檳榔一分半夏二錢生用上為細末醋煮稀糊丸如緑豆大不計時白湯下十五粒遇大府通利且止若氣發作大府不通即加至五十粒以通為度此病須是服此藥令氣塊消然不可驟然多服須待積久消磨每日且只一二服覺得氣消不痛卻只一日一服或三日二日一服仍旋服後面散子以補氣常服散子人參半兩黃耆半兩當歸半兩白朮一分木香一分陳橘皮去白一分甘草二分炙青橘皮去白一分沉香一分上為細末每服三四錢匕水一煎姜二片同煎取七八分不計時服遇氣痛時每服添枳實末一二豆許上陳侍御宜人嘗因不喜悅中食柑自後遂苦心腹痛久之腹中結塊遇痛作時往往悶絶移時方蘇而常在夜間是時侍御作闢癰博士京師醫者皆不能治有齊生蜀人史堪載之者醫聞一時乃處此二方服一兩月間遂去根本後二十餘年復因憂悒此疾似欲再作而已微痛即再合服之數日而愈治婦人産後胎衣不下鄉人萬應之祕校傳凡産有産後胎衣不合諸血奔入久而血上衝心遂致不救者有産前失血過多胎衣乾澀不下者庸醫不曉例以破血藥治之不知血盡轉澀遂終不救舊有産婦胎衣不下呻吟痛楚聲不可聞忽有人教之用苧麻浸水兩大碗服之即時嘔吐胎衣便下遂得更生安腎丸治本氣怯弱筋骨無力或時疼痛信州李諒駐泊傳熟乾地黃洗淨焙乾一兩牡丹皮半兩附子炮去皮尖半兩金叉石斛半兩破故紙炒半兩山藥半兩肉桂半兩去皮稱白蒺藜炒去刺半兩巴戟天去心稱一兩肉蓯蓉酒浸一宿一兩切焙白茯苓半兩去皮稱澤瀉微炒半兩萆薢半兩白朮半兩上件為細末用煉蜜和為丸如梧桐子大每服三十丸至四十丸用溫酒或鹽湯送下食前空心服神授散治傷折內外損豫屢用之甚驗川當歸半兩洗淨別搗鉛粉半兩洛粉最上硼砂二錢上同研細每服二錢濃煎蘇枋汁調下若損在腰以上先吃淡面半碗然後服藥在腰以下先服藥後吃麵仍不住呷蘇枋汁更以糯米為粥入藥二錢拌和攤在紙上或絹上封裹損處如骨碎則更用竹木夾定外以紙或衣物護之沈存中雲長安石使君一日在闤闠中忽有呼其姓第回顧不見明日過市復聞呼聲曰我無求於人以爾有難特來救爾石謝之欲下馬與語其人止之褫衣領中出一書曰有難即用稠人中遂引去石歸視乃此方也石到京師趨朝立馬右掖門外為他馬所䞶折足墮地又為馬踏手臂折舁至家屢氣絶急合此藥服且裹半夜痛止後手足皆平復普救散治四時傷寒渾身發熱四肢疼痛頭重眼疼不問陰陽二證並皆治之永平龐知監施此藥蒼朮一斤米泔水浸三日切焙乾乾葛半斤切焙甘草四兩炙赤色切細上為粗末每服二大錢水一中盞煎至七分去滓熱服如要出汗加連根蔥白二寸同煎並兩服滓再煎一服不拘時候仍用沙銚不得犯銅鐵器初發傷寒宜下此藥汗後勿服治喉口熱毒至甚咽喉胸膈內連心肺疼痛飲水不下氣不能出死在須臾名曰馬閉繞州上官醫傳巴豆七粒去殼膜研如泥上以壞子一錢同研成膏子每用一字許醋煎皂角汁調令稀稠得所將鵝毛蘸藥掃於喉間良久咳唾出膿血或涎數升然後用第二法其法白礬飛過白殭蠶微切各半兩為細末每服半錢新汲水調下肉豆蔻湯治胸膈痞塞不快脾胃有傷景盧傳肉豆蔻炮草果子去皮石菖蒲乾木瓜良薑乾薑厚朴姜炙甘草炙各一兩上等分為細末每服一錢鹽湯點服
