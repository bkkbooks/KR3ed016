body:
  text: 卷第一治痢先忠宣獲此方屢有神驗黃連吳茱萸各二兩如常法揀洗焙乾黃連銼令寸斷同一處炒俟香熟分為二各用醋糊為丸如桐子大若小兒則如緑豆大悉赤痢則服黃連白痢則服茱萸赤白則並服之赤先白後則先黃連而後茱萸赤多白少則二分黃連一分茱萸反是亦如之每服五七十粒至百粒服之以愈為度陳米飲下大率茱萸治白黃連治赤也黃連用鷹爪者肉豆蔻散治赤白痢無藥可治者其效如神上吐下痢者亦治以下三方韓子溫少卿傳肉豆蔻切片子炒黃色櫻粟殼搗碎用蜜掿拌勻炒黑黃甘草切碎炒黃黑色乾生薑切細炒黃黑上等分搗羅為末每服六錢如赤痢多加甘草一寸炙黃同煎若白痢多加炒生薑一塊同煎用水二大盞煎至一盞半通口服不計時候卻將兩服滓再煎服無不愈者祛瘧散熱多寒少者一服無不驗豫家每合以濟人一服即愈治時行寒熱諸藥不效者今有夢中神傳藥方如有此疾者依方服之即愈如所感深重一服未愈者定毒發一次更不再來好高良薑銼碎微炒好川白姜炮銼二味各碾為極細末上各稱等分勿令偏些再入乳鉢內一處研勻細羅過二味病大者共抄三大錢病小者共三小錢於當發日日未出時以獖豬膽二枚勿用白色者割開取汁與藥調勻再用熱酒少許打勻通口猛作口咽更以酒少許送下急嗽口以甜物壓之一日不得吃別藥忌大寒物其膽須是獖豬膽其翁母豬膽不中江南謂之鐓豬大交泰丹傷寒未分陰陽不可服治陰陽二毒傷寒或因下早亡陽或致結伏胸膈四肢厥冷脈息俱無心躁如火或因冷物傷脾夾臍疰痛生硬入胃中滿痞塞潮發寒熱並治翻胃噦逆霍亂吐痢小腸痃癖脅肋氣痛但是陰陽不順惡候傷寒壞證並皆治之每服一粒炭火內煅通赤良久取出放冷細研如粉米飲一盞煎七分溫服不拘時候隔半時辰再進一服其效如神兼治小兒瘡疹倒厭依法服半粒立愈金星石太陰玄精石銀星石雲母石白色片子代赭石桂府滑石禹余石以上各一兩寒水石吉州者一兩半不灰木一兩色青黑性軟者上件九味入瓷瓶子炭半稱煅候火耗一半取出放冷研為細末糯米粥為丸如彈子大候乾用系醫壞證傷寒一服可活一人混元胎丹乃陰陽始生之物氣精血初生之英華蓋人元宮真氣所化修真之士服餌補漏壯氣固神益髓通神明延壽命增益道涯超範圍外內丹之基具服餌方如後久無嗣息者服此有驗以首兒衣二八月者不用收時連帶中元血收用長流水淨洗控干入瓷瓶中下無灰法酒三大勝腦子麝香隨力下之多止一錢或半字以紙封瓶口下用文武火煅候酒將盡取出再入酒三勝依前煅卻用竹篦或金銀篦不住攪以覺爛糜似粥模樣待冷取入砂盆內細研如粉別入外料人參二兩茯苓二兩乳香半兩硃砂半兩水飛過晾乾取淨山藥四兩以上併為細末人參等須擇佳者上用上件藥末入於所煮藥內如干時更用原煅酒旋旋添拌勻一處攪搜為丸梧桐子大慢火焙乾每日空心五十粒加至一百粒用溫酒鹽湯下良久用甜淡飲食飽壓逐日葷味中減少五味謂甜淡咸等物服至五七日微覺小腹連腰沉重不須疑慮乃是藥力攻元氣相補助如此還少丹西川羅赤腳仙還少丹大補心腎脾胃一切虛損神志俱耗筋力頓衰腰腳沉重肢體倦怠血氣羸之小便昏濁陳晦叔敷文傳乾山藥牛膝酒浸一宿焙乾各一兩半山茱萸白茯苓去皮五味子肉蓯蓉酒浸一宿焙乾石菖蒲巴戟去心遠志去心杜仲去粗皮用生薑汁並酒合和塗炙令熟楮實舶上茴香以上各一兩枸杞子熟乾地黃各半兩上搗羅為末煉蜜入棗肉為丸如梧桐子大每服三十丸溫酒鹽湯下日進三服皆食空時如早食並服之無妨至五日覺有力十日精神爽健半月氣力稍盛二十日目明一月夜思飲食冬月手足常暖久服無毒令人身體輕健筋骨壯盛怡悅難老更看體候加減如身熱加山梔子一兩心氣不寧加麥門冬一兩少精神加五味子一兩陽弱加續斷一兩常服齒牢永無瘴瘧婦人服之姿容光悅去一切病治子宮久冷瓊玉膏鐵甕先生神仙祕法瓊玉膏陳晦叔服此藥有驗新羅人參二十四兩舂一千下為末生地黃一稱十六斤九月採搗雪白茯苓四十九兩木舂千下為末白沙蜜十斤上件人參茯苓為細末蜜用生絹濾過地黃取自然汁搗時不得用鐵器取汁盡去滓用藥一處拌和勻入銀石器或好瓷器內封用如器物小分兩處物盛用淨紙二三十重封閉入湯內以桑木柴火煮六日如連夜火即三日夜取出用蠟紙數重包瓶口入井內去火毒一伏時取出再入舊湯內煮一日出水氣取出開封取三匙作三盞祭天地百神焚香設拜至誠端心每晨朝以二匙溫酒化服不飲者白湯化之此膏填精補髓腸化為筋萬神具足五臟盈溢髓實血滿發白變黑返老還童行如奔馬日進數食或終日不食亦不飢關通強記日誦萬言神識高邁夜無夢想人年二十七歲以前服此一料可壽三百六十歲四十五歲以前服者可壽二百四十歲六十三歲以前服者可壽百草歲六十四歲以上服之可壽至百歲服之十劑絶嗜欲修陰功成地仙矣一料分五處可救五人癰疾分十處可救十人勞瘵修合之時沐浴志誠勿輕示人一粒金丹治中風癱瘓口眼喎斜涎潮語澀渾身疼痛應一切風疾悉皆治愈張真甫舍人傳得之劉信叔大川烏頭炮去皮臍大黑附子炮裂去皮臍新羅附子炮裂以上各二兩五靈脂一兩白殭蠶一兩去絲炒白蒺藜一兩炒去刺沒藥半兩研硃砂半兩研白礬一兩枯研麝香淨肉半兩研細香墨半兩金箔二百片上件前六味同為末後四味研勻同合和令勻用井花水一大盞研墨盡為度將汁搜和用杵臼內搗五百下和丸如彈子大金箔為衣窨干每服一粒用生薑一兩去皮攃取自然汁將藥丸於汁內磨化盡用無灰熱酒一大盞同浸化溫服更量性多少吃溫酒一二升投之以助藥力用衣被蓋覆汗出為效痛熱重者日進二服不拘時候張天師留傳老換少壯輕身強記駐顏悅色發白變黑開心中迷忘聰明耳目神妙六逸丸賀州王承務方李少卿若朴傳石菖蒲九節者能開心孔聰明耳目益智不忘出音聲治耳聾高志不老菟絲子補不足益氣力堅筋骨主口苦燥渴久服輕身延年地骨皮主五臟邪氣燥熱消渴裨益真氣久服輕身堅筋骨不老耐寒暑遠志補不足除邪氣益精神注智聰明耳目去皮膚中熱久服輕身不老好顏色益心生乾地黃填骨髓長肌肉去胃中宿食補五臟通血脈益氣力利耳目牛膝能助人筋骨偏治腰疼益真氣變白髮久服輕身不老耐寒暑上件藥各用二兩先總銼碎用酒浸之春夏五日秋冬七日慢火焙乾搗羅為末煉蜜為丸如梧桐子大每服空心溫酒下三十丸至五十丸百病俱退服至一百日老卻少容服至一年發如漆過二年顏如童子三年骨髓堅實四年鬼神自散精神爽清合藥並服時忌雞犬見所傳不得過十三家湖州杜助教所傳葛仙翁六神丸用藥六味與此方同鐵甕申先生交感丹俞居易侍郎傳世人中年精耗神衰常言百事心灰蓋緣心血少而火不能下降於腎氣憊而水不能上升至心中焦隔絶營衛不和所苦者上則心多驚悸中則寒痞飲食減少下則虛冷遺泄甚至於陰痿不興臟氣滑泄愚醫徒知峻補下田非獨不能生水滋心而建僞失真立見衰悴夭折之由當自此始悲夫所處此方廣濟迷流然不可忽此藥品志心服之半年漸屏去一切暖藥又不可持此而馳嗜欲然後力習祕固溯流之術其神效不可殫述質之天地切勿妄傳居易之祖通奉遺訓云豫年五十一歲遇鐵甕申先生授此祕術酷志行持服食一年大補平日所服暖藥一切屏盡而飲食嗜好不減壯歲此藥力之功大矣今年八十五享天然之壽瞑目無憾獨此藥傳之理當普示群生同登道果藥後有湯與牙藥可同用之茯神四兩香附子一斤去毛用新水浸一夕炒令黃色上為末煉蜜丸如彈子大每服侵晨一丸以後湯嚼下降氣湯茯神二兩香附子半斤炒浸如前甘草一兩半炙黃上為末每服二錢沸湯點下牙藥香附子五兩上以生薑三兩研和滓汁浸香附子三夕炒焦黑存性為末以青鹽二錢拌勻揩牙
