body:
  text: 卷第二癰疽化毒排膿內補散丞相兄刊是方於徽州予屢以施人皆效治一切癰疽瘡癤未成者速散已成者速潰敗膿自出無用手擠惡肉自去不犯刀杖服藥後疼痛頓減此其嘗試之效也歙丞胡權初得方于都下異人時有苦背瘍者七十餘頭諸藥遍試不效因出是方示之眾醫環立相目而笑曰是豈癰疽所用藥耶固謂之曰古人處方自有意義觀其所用藥性平和縱未能已疾必不至壞病服之何害乃治藥與服以熱酒半升許下藥五六錢少頃痛減七分數服之後瘡大潰膿血流迸若有物自內托之服之經月瘡口遂合若未嘗有所苦者又有苦腹疾者其痛異常醫者莫曉時意此藥頗能止痛試以餌之當日下膿二三碗許痛亦隨止乃腸癰也又一老人忽胸間發腫根腳甚大毒氣上攻如一瓠然斜插項右不能轉動服藥明日毒腫既散餘一小瘤如慄許大又明日帖然如故又一人發腦疑此方不服既殞於庸醫之手明年其子復苦此與父之狀不異因懲父之失縱酒飲藥遂至大醉竟日袞臥地上酒醒病已去矣又一婦人髮乳焮腫疼痛不可堪忍自謂無復生理又二婦人股間發腫大如杯碗服此皆脫然如失蒙濟者不可悉數姑敘大略以示未知此方者大抵癰疽之作皆氣血凝滯風毒壅結所致治之不早則外壞肌肉內攻臟腑去生遠矣詳味此方其所用者皆發散風毒流行氣血排膿止痛生肌長肉等藥五毒不試而坐收瘍醫十全之功其可尚已今按本草於逐味下聊疏藥性溫涼與所治療雖處方妙指不可遽曉庶倉猝之際可以見其用藥大意而服之不疑人參微溫無毒主補五臟除邪氣通血脈破堅積療心腹鼓痛胸脅逆滿今以新羅者為上擇團結重實滋潤者洗淨去蘆薄切焙乾當歸大溫無毒主溫中止痛除客血內塞客氣虛冷補五臟生肌肉治一切風一切勞破惡血養新血又外臺金匱等方皆謂大補不足決取立效之藥凡氣血昏亂者服之即定謂能使氣血歸所當歸制名之義宜出於此今取川中來者擇大片如馬尾狀滋潤甜辣芬香者溫水洗薄切焙乾黃耆微溫無毒主癰疽久敗瘡排膿止痛逐五臟間惡血補丈夫虛損五勞羸瘦煩悶熱毒活血以綿上來者為勝狀如箭竿長二三尺頭不叉者洗淨寸截槌破懸壁以鹽湯潤透用盞盛蓋湯瓶上一炊久焙燥隨眾藥入碾即成細末芎藭溫無毒主中風入腦頭痛寒痹筋攣拘急除腦中冷痛面上遊風治一切風一切氣一切血一切勞損諸寒心腹堅痛中惡卒急腫痛腰腳軟弱半身不遂壯筋骨調眾脈破癥結治癰疽發背排膿消瘀養血長肉以川中來者為上今多用撫芎大塊者淨洗切焙防風溫無毒治心腹痛四肢拘急經脈虛羸主骨節風男子一切勞劣補中益神通利五臟關脈五勞七傷羸損盜汗心煩體重能安神定志勻氣脈擇新香者淨洗切焙厚朴大溫無毒主中風寒熱血痹死肌溫中下氣去留熱止煩滿厚腸胃去結水破宿血消化水穀止五臟一切氣痛宜用梓州來者肉厚而色紫掐之油出去粗皮切薑汁窨一宿爁熟焙燥切勿用杜樸桔梗微溫有小毒主胸脅痛如刀刺腹滿腸鳴利五臟補血氣除寒熱破血消積止心腹脹痛補五勞養氣除邪又養血排膿補內漏療胸中寒肺脈數咽噪不渴時時出濁唾腥臭吐膿如粳米粥是肺癰治之用桔梗甘草各二兩水三升煮取一升分再服朝暮吐膿血即瘥今所在有之以有心味苦者為真無心味甘者薺苨也主解藥毒恐於眾藥不利切勿誤用洗淨去頭尾薄切焙燥白芷溫無毒破宿血長新血治乳癰瘰癧腸風痔瘻排膿止痛生肌桂大熱有小毒一曰溫無毒為諸藥先聘主溫中利肝肺氣去心腹寒熱補五勞七傷通九竅利關節破痃癖癥瘕消瘀血續筋骨生肌肉筒厚者宜入治臟及下部藥輕薄者宜入治頭目發散藥今宜用卷薄者古法帶皮桂每兩止取二錢半合用一兩者當買四兩候眾藥罷別碾方入甘草平無毒主臟腑寒熱邪氣堅筋骨長肌肉解毒溫中下氣倍力生用上十味選藥貴精皆取淨曬焙極燥方秤人參當歸黃耆各二兩余各一兩除桂外一處為細末入桂令勻每服自三錢加至五六錢熱酒調下日夜各數服以多為妙服至瘡口合更服為佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒力之勝也或飲酒不多能勉強間用酒調並以木香湯解酒功效當不減於酒也神授癰疽靈方唐呂西華遇胡僧授此方沈存中良方備載其事白麥飯石顏色黃白類麥飯者曾作磨者尤佳炭火燒赤醋中浸之十遍止為末白蘞末與石等分鹿角三二寸截之不用自脫者凡帶腦骨者即非自脫炭火燒之煙盡為度搗為末倍前二味上並搗篩令細取多年米醋於鐺中煎並令魚眼沸即下前件末調如稀餳以篦子塗敷腫上只當瘡頭留一指面地勿令合以出熱氣如未膿當內消若已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即於布上塗藥貼之瘡上干即再換但以鬲中不穴無不瘥瘡切忌手觸宜戒之劉夢得傳信方亦載治乳癰發背諸般瘡毒丹陽僧傳金銀花一名忍寒草上採葉研為滓敷瘡口花五出而白微香蒂帶紅色野生延蔓葉如薜荔而青予見沈存中良方所載忍冬嫩苗治癰疽云江西醫僧鑑清善治背疽得其方用老翁須後在金陵聞醫王善琪治瘍其方用水楊藤觀之乃老翁須也又友人王子淵自言得神方活數人方用大薜荔又杜醫治瘍常以二萬錢活一人方用千金藤又寧國尉王子駿傳一方用金銀花海州士人劉純臣傳一方用金釵股皆自神其方求其草視之蓋一物也存中雲倉卒求不獲只用干葉為散並甘草酒煮服然不及生者靈寶膏治一切癰疽腦疽發背等疾楊池州傳云是方得之異人和王施此藥前後活數百人甚有神驗大栝蔞十枚隔二三年陳者盡去其皮留穰子約有半升許用砂盆研細如粉新胡桃十枚不油者湯去膜研細如粉滴乳香十塊如大指頭大乳缽內研細如粉上用白沙蜜十兩同前藥於銀石器內極慢火熬三時辰其稠如飴糖多合少合準此每服二匙無灰酒半盞調下不拘時候甚者不過兩三服其效如神治癰疽發背初覺毒氣攻系赤腫焮痛方行在金翰林傳犀角鎊一兩玄參一兩川升麻一兩黃耆一兩赤芍藥一兩麥門冬一兩去心甘草一兩當歸一兩大黃二兩微炒上為粗末每服三錢水一盞煎八分去滓不計時發背灸法一郭廷圭知縣傳先用蠟線度左手中指頭至手掌下橫紋止其橫紋有三兩條當以長而分明者為正卻將所度蠟線自尾閭骨取中逆量至脊槌骨如度之長以墨記之次以蠟線取中指中節量一寸中指中節兩頭橫紋多當側取橫紋中長而分明者為正卻將所量蠟線橫於墨點處每邊各量一寸朱點記之此正灸穴處前以墨處乃用取中非灸穴也視背疽發於左則灸右發右則灸左甚則左右皆灸至三十壯而止婦人則用右手中指取度其灸法與男子同婦人奶癰凡發背發肋發腦發腿之類不論男女皆可灸郭云自得此法救人不可勝計有親戚姓陳者得此疾其妻兒告急而陳苦不之信迫不得已灸之才十壯其紅腫處漸消於是欣然聽命再灸二十壯覺熱毒之氣從腫處下如以手拓從尾閭骨發散陳至今無恙又云莊婦忽背間癢痛傴背以行問知其狀使以法灸隨手即愈如是非一不能盡記發背灸法二葉子昂丞相傳男左女右以手中指自上至手盡處第一路為度卻用此去自尾閭骨盡處量在腰間點定穴卻用中指中間一節為度自穴分左右背左處發則灸左穴右亦然止三十艾甚則左右穴皆灸婦人乳癰亦用此法治之治背疽糝藥童縣尉傳龍游有患背疽已潰如碗麵大視五臟僅隔薄膜耳自謂必死有用大鯽魚一枚刳去腸臟以羯羊糞實其中烘焙焦黑極乾燥研為細末干糝之瘡口遂收至今無恙內消發背杏仁三七粒巴豆三七粒去油令盡硇砂半錢乳香半錢上將上件藥一處研細次用淮棗三七個去皮核研碎又用丁香三七粒斑蝥三七個烏梅三七個去核三味同為末通前藥拌勻用餅藥面十文生面十文以冷水搜裹藥在內慢火煅一日莫令燒過候藥熟取出地上將盆蓋覆出火氣然後出面只取藥細研入少許蒸餅末滴水為丸如綠豆大老者七粒壯者十粒旋入甘草少許用馬蘭酒吞下春用馬蘭苗四兩生者秋後用馬蘭根白芽四兩研細同酒半升研去滓吞下如不飲酒蜜水亦可只可三服治甲疽胬肉裹甲膿血疼痛不瘥出靈苑膽礬洗上先剔去甲中肉敷藥瘡上縱有胬肉才敷即乾落治腫毒發背一切癰疽經驗方鄱陽都路分因請大仙得此方徐綱鏤板印施便癰腸癰皆治橫紋甘草一兩炙乾碾為細末上分為三服無灰熱酒調一服如人行一里再一服三服並吃鄱陽徐綱忽患右足赤腫三日不能履地醫治無效才服此藥須臾之間即能移步再服全愈治腫毒發背一切癰疽奪命膏趙教授得之全州醫屢有神驗以下三方次第用之麻油四兩熬一二沸石蟹一枚燒米醋淬才黑又燒碎為末防風一兩切焙蛤蚧一對煅存性燈心灰一分蜈蚣一條燒存性全蠍七個燒存性血竭一分別研黃連半兩去蘆切焙當歸半兩切焙上件為末用文武火熬麻油滴水中不散次入眾藥一處急用柳枝不住手攪候滴入水中成珠為度候極冷貼瘡如常法勝冰散茵陳半兩焙防風半兩焙滑石一兩別細研當歸半兩焙地龍半兩碾乳香半兩別研螺青一兩研馬牙硝半兩研各取末上八味一處和勻用新汲水調塗腫處不可令稀時時塗之勿使至干應痛內托丸赤芍藥一兩焙當歸一兩焙血竭一分研麝香一分研栝蔞根二兩火煅存性人參半兩焙沉香半兩銼茵陳半兩焙全蠍七枚煅存性大黃一分焙上件十味和勻為末煉蜜丸如彈子大每服一粒乳香湯化破服之或嚼吃亦得不拘時聖柳散蒼朮四兩米泔水浸一宿焙連翹一兩焙甘草一兩炙大黃半兩切人參半兩切赤茯苓半兩切黃芩二錢半煅存性桔梗半兩白朮一分枳殼一兩麩炒去白南木香一兩切益智一兩去皮切白芷半兩焙苦參一兩切上件為細末如渴時加牙硝半兩別研入每服二大錢水一盞柳枝七寸同煎至八分去滓溫服不拘時初發即用奪命膏貼如胸膈滿悶大腸秘結即用應痛內托丸主之如四邊赤腫日增即用勝冰散主之如煩渴不已疾勢轉增即用勝柳散此疾淺深治法次第也忌雞肉濕面疾愈半年方可食治癰疽立效方小兒暑月頭額生癤亦可用生水蛭一名馬蟥蜞取數枚置碗水中用訖縱之冬月蟄於積水邊或田塍水道邊掘土取之上用薄紙一片剪丸如瘡大仍看瘡膿頭有幾個其紙對膿頭作小眼搭在瘡上將水蛭著在紙眼處每一膿頭用一水蛭要得先咂去膿其痛立止如無膿頭即以手指按之覺最熱處是也或用茶末以水調塗瘡上看先干處即點記如不能辨即著在中間如膿頭只一個而赤暈稍大即近中處加用水蛭如膿血咂盡痛定腫退可用膏藥貼之紹興中汀州黃守武疽發肩背之間醫藥不瘥用水蛭立效因就寢蓋被稍暖睡覺衣被皆濕以燭視之乃瘡口自出血也水蛭咂盡惡血不曾貼膏藥身暖好血隨路而出急令取池中藕將藕節處泥抹瘡口其血立止按本草云水蛭攻癰腫毒腫取十餘枚啗病處取皮皺肉白無不瘥冬月中無水蛭蟲地中掘取暖水中養之令動先洗去人皮咸以竹筒盛蛭綴之須臾便咬血滿自脫更用飢者張仲欽運使傳云紹興壬申歲沿檄至汀親目其事
